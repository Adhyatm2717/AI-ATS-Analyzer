<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimizer AI | Mock Interview</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
        <div class="mesh-blob blob-4"></div>
    </div>
    <div class="noise-overlay"></div>

    <nav id="navbar" class="scrolled">
        <div class="container">
            <a href="index.html" class="logo">OPTIMIZER<span style="color: var(--primary);">.</span>AI</a>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <a href="results.html" class="btn-secondary" style="padding: 0.6rem 1.4rem; font-size: 0.85rem; border: none;">Back to Results</a>
                <a href="index.html" class="btn btn-glow" style="padding: 0.6rem 1.4rem; font-size: 0.85rem;">Analyze Another</a>
            </div>
        </div>
    </nav>

    <section style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="section-title reveal active" style="text-align: center; margin-bottom: 3rem;">
                <h2 style="font-size: 3.5rem; font-weight: 800;">Mock Interview Practice</h2>
                <p style="color: var(--text-muted); margin-top: 1rem;">Practice these exactly sequenced questions based on your resume and targeted job role.</p>
            </div>
            
            <div class="glass-card reveal active" style="max-width: 900px; margin: 0 auto; backdrop-filter: blur(40px);">
                <div id="interview-container" style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <!-- Javascript will populate the interview questions here -->
                </div>
            </div>
        </div>
    </section>

    <footer class="footer" style="margin-top: 3rem;">
        <div class="container">
            <div style="text-align: center; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
                &copy; 2026 OPTIMIZER.AI. High Performance Career Growth.
            </div>
        </div>
    </footer>

    <script src="interview.js"></script>
</body>
</html>
